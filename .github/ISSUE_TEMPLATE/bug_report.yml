name: Bug Report
description: Report a problem with funky-pixi-text
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Please fill out the sections below so we can reproduce and fix the issue quickly.

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
        - label: I am using a supported version of PIXI.js (^7.2.4).
          required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Steps (and ideally a minimal code snippet) to reproduce the behavior.
      placeholder: |
        1. Load font '...'
        2. Create a Text with style '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened. Include screenshots or console errors if relevant.
    validations:
      required: true

  - type: input
    id: lib-version
    attributes:
      label: funky-pixi-text version
      placeholder: "1.0.0"
    validations:
      required: true

  - type: input
    id: pixi-version
    attributes:
      label: PIXI.js version
      placeholder: "7.2.4"
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: Browser / Environment
      multiple: true
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Mobile (iOS)
        - Mobile (Android)
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might help (GPU, OS, performance preset in use, etc.).
    validations:
      required: false
